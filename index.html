<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Camera Planner - 机位规划工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0f1117; --panel: #1a1d27; --border: #2a2d3a;
  --text: #e2e8f0; --text2: #94a3b8; --accent: #3b82f6;
  --accent2: #60a5fa; --green: #22c55e; --red: #ef4444;
  --orange: #f59e0b; --purple: #a855f7;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
#topbar { height: 48px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; z-index: 10; }
#topbar .logo { font-size: 15px; font-weight: 700; color: var(--accent2); letter-spacing: 0.5px; }
#topbar .sep { width: 1px; height: 24px; background: var(--border); }
#topbar .info { font-size: 12px; color: var(--text2); }
.mode-tabs { display: flex; gap: 4px; margin-left: auto; }
.mode-tab { padding: 6px 14px; font-size: 12px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text2); transition: all .15s; }
.mode-tab:hover { border-color: var(--accent); color: var(--text); }
.mode-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
#main { flex: 1; display: flex; overflow: hidden; }
#viewport { flex: 1; position: relative; background: #0a0c12; }
#viewport canvas { display: block; width: 100%; height: 100%; }
#sidebar { width: 280px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
.sidebar-section { padding: 14px; border-bottom: 1px solid var(--border); }
.sidebar-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 10px; }
.cam-list { display: flex; flex-direction: column; gap: 4px; }
.cam-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: all .15s; }
.cam-item:hover { background: rgba(255,255,255,0.04); }
.cam-item.selected { background: rgba(59,130,246,0.12); border-color: var(--accent); }
.cam-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cam-name { font-size: 13px; flex: 1; }
.cam-focal { font-size: 11px; color: var(--text2); }
.cam-del { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; font-size: 14px; color: var(--text2); opacity: 0; transition: .15s; }
.cam-item:hover .cam-del { opacity: 1; }
.cam-del:hover { background: var(--red); color: #fff; }
.btn { padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 12px; cursor: pointer; transition: .15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn:hover { border-color: var(--accent); background: rgba(59,130,246,0.08); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { background: #2563eb; }
.btn-row { display: flex; gap: 6px; }
.btn-row .btn { flex: 1; }
.param-group { margin-bottom: 10px; }
.param-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; display: flex; justify-content: space-between; }
.param-label span { color: var(--accent2); font-weight: 600; }
input[type="range"] { width: 100%; height: 4px; -webkit-appearance: none; background: var(--border); border-radius: 2px; outline: none; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
select { width: 100%; padding: 6px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 12px; outline: none; cursor: pointer; }
select:focus { border-color: var(--accent); }
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
.toggle-row label { font-size: 12px; color: var(--text2); }
.toggle { width: 36px; height: 20px; border-radius: 10px; background: var(--border); cursor: pointer; position: relative; transition: .2s; }
.toggle.on { background: var(--accent); }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: .2s; }
.toggle.on::after { left: 18px; }
#viewfinder-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 5; }
.vf-info { position: absolute; bottom: 12px; left: 12px; display: flex; gap: 16px; font-size: 12px; font-family: 'SF Mono', 'Consolas', monospace; }
.vf-info-item { background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; backdrop-filter: blur(4px); }
.vf-info-item .val { color: var(--accent2); font-weight: 600; }
.vf-cam-name { position: absolute; top: 12px; left: 12px; font-size: 14px; font-weight: 600; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 4px; backdrop-filter: blur(4px); }
.vf-rec { position: absolute; top: 12px; right: 12px; display: flex; align-items: center; gap: 6px; font-size: 12px; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 4px; }
.vf-rec-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); animation: blink 1s infinite; }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
.grid-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
.safe-frame { position: absolute; border: 1px solid rgba(255,255,255,0.2); }
.hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 13px; color: var(--text2); background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 8px; pointer-events: none; z-index: 20; }
.add-mode-hint { background: rgba(59,130,246,0.15); border: 1px solid var(--accent); color: var(--accent2); }
</style>
</head>
<body>
<div id="topbar">
  <div class="logo">CAM PLANNER</div>
  <div class="sep"></div>
  <div class="info" id="scene-info">Studio Scene | 32m x 24m</div>
  <div class="mode-tabs">
    <div class="mode-tab active" data-mode="navigate" onclick="setMode('navigate')">自由浏览</div>
    <div class="mode-tab" data-mode="add" onclick="setMode('add')">+ 添加机位</div>
  </div>
  <div class="sep"></div>
  <div class="mode-tab" id="vf-tab" onclick="toggleViewfinder()" style="margin-left:0">取景器</div>
</div>
<div id="main">
  <div id="viewport">
    <div id="viewfinder-overlay" style="display:none">
      <div class="vf-cam-name" id="vf-cam-name">CAM-01</div>
      <div class="vf-rec"><div class="vf-rec-dot"></div>LIVE</div>
      <canvas id="grid-canvas" class="grid-overlay"></canvas>
      <div class="safe-frame" id="action-safe" style="top:5%;left:5%;right:5%;bottom:5%"></div>
      <div class="safe-frame" id="title-safe" style="top:10%;left:10%;right:10%;bottom:10%;border-style:dashed"></div>
      <div class="vf-info">
        <div class="vf-info-item"><span class="val" id="vf-focal">50</span>mm</div>
        <div class="vf-info-item">f/<span class="val" id="vf-fstop">2.8</span></div>
        <div class="vf-info-item">FOV <span class="val" id="vf-fov">46.8</span>&deg;</div>
        <div class="vf-info-item" id="vf-sensor-info">36x24mm</div>
      </div>
    </div>
    <div class="hint" id="hint-text" style="display:none"></div>
  </div>
  <div id="sidebar">
    <div class="sidebar-section">
      <h3>机位列表</h3>
      <div class="cam-list" id="cam-list"></div>
      <div style="margin-top:10px">
        <button class="btn primary" style="width:100%" onclick="setMode('add')">+ 添加机位</button>
      </div>
    </div>
    <div class="sidebar-section" id="params-section" style="display:none">
      <h3>镜头参数</h3>
      <div class="param-group">
        <div class="param-label">传感器预设</div>
        <select id="sensor-select" onchange="onSensorChange()">
          <option value="36,24">全画幅 36×24mm</option>
          <option value="27.99,23.04">ARRI Alexa 35 (4:3)</option>
          <option value="40.96,21.6">RED V-Raptor 8K VV</option>
          <option value="35.7,18.8">Sony FX6 Full Frame</option>
          <option value="26.2,13.8">Canon C70 Super 35</option>
          <option value="23.1,12.95">BMPCC 6K Super 35</option>
          <option value="13.2,8.8">MFT 微型4/3</option>
        </select>
      </div>
      <div class="param-group">
        <div class="param-label">焦距 <span id="focal-val">50mm</span></div>
        <input type="range" id="focal-range" min="8" max="300" value="50" step="1" oninput="onFocalChange(this.value)">
      </div>
      <div class="param-group">
        <div class="param-label">光圈 (f-stop) <span id="fstop-val">f/2.8</span></div>
        <input type="range" id="fstop-range" min="1.4" max="22" value="2.8" step="0.1" oninput="onFStopChange(this.value)">
      </div>
      <div class="param-group">
        <div class="param-label">机位高度 <span id="height-val">1.6m</span></div>
        <input type="range" id="height-range" min="0.2" max="8" value="1.6" step="0.1" oninput="onHeightChange(this.value)">
      </div>
      <div class="param-group">
        <div class="param-label">水平旋转 <span id="yaw-val">0&deg;</span></div>
        <input type="range" id="yaw-range" min="-180" max="180" value="0" step="1" oninput="onYawChange(this.value)">
      </div>
      <div class="param-group">
        <div class="param-label">俯仰角 <span id="pitch-val">0&deg;</span></div>
        <input type="range" id="pitch-range" min="-45" max="45" value="0" step="1" oninput="onPitchChange(this.value)">
      </div>
    </div>
    <div class="sidebar-section" id="overlay-section">
      <h3>取景器叠加</h3>
      <div class="toggle-row"><label>三分线</label><div class="toggle on" id="tog-grid" onclick="toggleOverlay('grid')"></div></div>
      <div class="toggle-row"><label>Action Safe</label><div class="toggle on" id="tog-action" onclick="toggleOverlay('action')"></div></div>
      <div class="toggle-row"><label>Title Safe</label><div class="toggle on" id="tog-title" onclick="toggleOverlay('title')"></div></div>
      <div class="toggle-row"><label>水平仪</label><div class="toggle" id="tog-level" onclick="toggleOverlay('level')"></div></div>
    </div>
    <div class="sidebar-section">
      <h3>场景</h3>
      <div class="toggle-row"><label>网格地面</label><div class="toggle on" id="tog-floor" onclick="toggleScene('floor')"></div></div>
      <div class="toggle-row"><label>环境物体</label><div class="toggle on" id="tog-objects" onclick="toggleScene('objects')"></div></div>
      <div class="toggle-row"><label>机位标记</label><div class="toggle on" id="tog-markers" onclick="toggleScene('markers')"></div></div>
    </div>
    <div class="sidebar-section" style="border-bottom:none">
      <h3>快捷键</h3>
      <div style="font-size:11px;color:var(--text2);line-height:1.8">
        <div><kbd style="background:var(--bg);padding:1px 5px;border-radius:3px;border:1px solid var(--border)">1-9</kbd> 切换机位</div>
        <div><kbd style="background:var(--bg);padding:1px 5px;border-radius:3px;border:1px solid var(--border)">V</kbd> 取景器开关</div>
        <div><kbd style="background:var(--bg);padding:1px 5px;border-radius:3px;border:1px solid var(--border)">A</kbd> 添加机位</div>
        <div><kbd style="background:var(--bg);padding:1px 5px;border-radius:3px;border:1px solid var(--border)">Esc</kbd> 取消/返回浏览</div>
        <div><kbd style="background:var(--bg);padding:1px 5px;border-radius:3px;border:1px solid var(--border)">Del</kbd> 删除当前机位</div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// State
// ═══════════════════════════════════════════
const state = {
  mode: 'navigate',      // 'navigate' | 'add'
  viewfinder: false,
  cameras: [],
  selectedIdx: -1,
  camCounter: 0,
  overlays: { grid: true, action: true, title: true, level: false },
  sceneItems: { floor: true, objects: true, markers: true },
};

const COLORS = [0x3b82f6, 0xef4444, 0x22c55e, 0xf59e0b, 0xa855f7, 0x06b6d4, 0xec4899, 0x84cc16, 0xf97316];

// ═══════════════════════════════════════════
// Three.js Setup
// ═══════════════════════════════════════════
const viewport = document.getElementById('viewport');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
viewport.insertBefore(renderer.domElement, viewport.firstChild);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0c12);
scene.fog = new THREE.Fog(0x0a0c12, 30, 80);

// Main camera (free navigation)
const mainCamera = new THREE.PerspectiveCamera(55, 1, 0.1, 200);
mainCamera.position.set(12, 8, 14);

const controls = new THREE.OrbitControls(mainCamera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2 - 0.05;
controls.minDistance = 2;
controls.maxDistance = 60;

// Viewfinder camera (for camera preview)
const vfCamera = new THREE.PerspectiveCamera(50, 1.5, 0.05, 200);

// ═══════════════════════════════════════════
// Scene Objects
// ═══════════════════════════════════════════
const sceneGroup = new THREE.Group();
const objectsGroup = new THREE.Group();
const markersGroup = new THREE.Group();
scene.add(sceneGroup);
sceneGroup.add(objectsGroup);
sceneGroup.add(markersGroup);

// Floor
const floorGeo = new THREE.PlaneGeometry(40, 30);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1d27, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
objectsGroup.add(floor);

// Grid
const gridHelper = new THREE.GridHelper(40, 40, 0x2a2d3a, 0x1e2130);
objectsGroup.add(gridHelper);

// Walls
function addWall(w, h, x, y, z, ry, color) {
  const geo = new THREE.BoxGeometry(w, h, 0.15);
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.8 });
  const wall = new THREE.Mesh(geo, mat);
  wall.position.set(x, y, z);
  wall.rotation.y = ry || 0;
  wall.castShadow = true;
  wall.receiveShadow = true;
  objectsGroup.add(wall);
}
addWall(20, 4, 0, 2, -8, 0, 0x252830);   // Back wall
addWall(16, 4, -10, 2, 0, Math.PI/2, 0x22252d); // Left wall
addWall(16, 4, 10, 2, 0, Math.PI/2, 0x22252d);  // Right wall

// Furniture
function addBox(w, h, d, x, y, z, color) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.1 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  objectsGroup.add(mesh);
  return mesh;
}
// Stage platform
addBox(8, 0.4, 5, 0, 0.2, -4, 0x2d3748);
// Table
addBox(2.4, 0.08, 1.2, -5, 0.75, 2, 0x4a5568);
addBox(0.06, 0.75, 0.06, -5.9, 0.375, 2.45, 0x4a5568);
addBox(0.06, 0.75, 0.06, -4.1, 0.375, 2.45, 0x4a5568);
addBox(0.06, 0.75, 0.06, -5.9, 0.375, 1.55, 0x4a5568);
addBox(0.06, 0.75, 0.06, -4.1, 0.375, 1.55, 0x4a5568);
// Chairs
for (let i = 0; i < 4; i++) {
  const cx = -5 + (i % 2) * 2.5 - 1.25;
  const cz = 2 + Math.floor(i / 2) * 2 - 1;
  addBox(0.5, 0.05, 0.5, cx, 0.45, cz, 0x718096);
  addBox(0.5, 0.6, 0.05, cx, 0.75, cz - 0.22, 0x718096);
}
// Podium / lectern
addBox(0.6, 1.2, 0.5, 3, 0.6, -3.5, 0x4a5568);
// Monitor screens on back wall
addBox(3, 1.8, 0.08, -3, 2.5, -7.8, 0x1e40af);
addBox(3, 1.8, 0.08, 3, 2.5, -7.8, 0x1e3a5f);
// Sofa
addBox(2.5, 0.4, 0.9, 6, 0.3, 3, 0x6b4226);
addBox(2.5, 0.5, 0.15, 6, 0.65, 2.6, 0x6b4226);
// Standing person placeholders (cylinders)
for (let i = 0; i < 3; i++) {
  const px = -2 + i * 2, pz = -2;
  const bodyGeo = new THREE.CylinderGeometry(0.2, 0.2, 1.2, 8);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x64748b });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.set(px, 1.0, pz);
  body.castShadow = true;
  objectsGroup.add(body);
  const headGeo = new THREE.SphereGeometry(0.18, 8, 8);
  const head = new THREE.Mesh(headGeo, bodyMat);
  head.position.set(px, 1.78, pz);
  objectsGroup.add(head);
}

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
scene.add(ambientLight);

const keyLight = new THREE.DirectionalLight(0xfff5e6, 0.8);
keyLight.position.set(5, 10, 5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.left = -15;
keyLight.shadow.camera.right = 15;
keyLight.shadow.camera.top = 15;
keyLight.shadow.camera.bottom = -15;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xb0c4de, 0.3);
fillLight.position.set(-8, 6, -3);
scene.add(fillLight);

const spotStage = new THREE.SpotLight(0xffffff, 0.6, 20, Math.PI/6, 0.5);
spotStage.position.set(0, 8, -3);
spotStage.target.position.set(0, 0, -4);
scene.add(spotStage);
scene.add(spotStage.target);

// Colored accent lights
const accentLight1 = new THREE.PointLight(0x3b82f6, 0.5, 12);
accentLight1.position.set(-8, 3, -5);
scene.add(accentLight1);
const accentLight2 = new THREE.PointLight(0xf59e0b, 0.4, 12);
accentLight2.position.set(8, 3, 4);
scene.add(accentLight2);

// ═══════════════════════════════════════════
// Camera Markers
// ═══════════════════════════════════════════
function createCameraMarker(camData) {
  const group = new THREE.Group();
  const color = camData.color;

  // Camera body
  const bodyGeo = new THREE.BoxGeometry(0.35, 0.25, 0.5);
  const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.3, metalness: 0.6 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  group.add(body);

  // Lens cylinder
  const lensGeo = new THREE.CylinderGeometry(0.08, 0.12, 0.25, 12);
  const lensMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.2, metalness: 0.8 });
  const lens = new THREE.Mesh(lensGeo, lensMat);
  lens.rotation.x = Math.PI / 2;
  lens.position.z = 0.35;
  group.add(lens);

  // Direction cone (frustum indicator)
  const fovRad = camData.fov * Math.PI / 180;
  const coneLen = 2;
  const coneRad = Math.tan(fovRad / 2) * coneLen;
  const coneGeo = new THREE.ConeGeometry(coneRad, coneLen, 4, 1, true);
  const coneMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.08, side: THREE.DoubleSide, depthWrite: false });
  const cone = new THREE.Mesh(coneGeo, coneMat);
  cone.rotation.x = Math.PI / 2;
  cone.position.z = 0.25 + coneLen / 2;
  group.add(cone);

  // Cone wireframe
  const wireGeo = new THREE.BufferGeometry();
  const hw = coneRad, hh = coneRad * (16/9 > 1 ? 9/16 : 1);
  const verts = new Float32Array([
    0, 0, 0.25,
    -hw, hh, 0.25 + coneLen,  hw, hh, 0.25 + coneLen,
    hw, -hh, 0.25 + coneLen, -hw, -hh, 0.25 + coneLen,
  ]);
  const indices = [0,1,2, 0,2,3, 0,3,4, 0,4,1, 1,2,3, 1,3,4];
  wireGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  wireGeo.setIndex(indices);
  const wireMat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.3 });
  const wire = new THREE.LineSegments(wireGeo, wireMat);
  group.add(wire);

  // Stand (tripod line)
  const standGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(0, -camData.height, 0)
  ]);
  const standMat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.4 });
  group.add(new THREE.Line(standGeo, standMat));

  // Position and rotation
  group.position.set(camData.x, camData.height, camData.z);
  group.rotation.y = -camData.yaw * Math.PI / 180;
  group.rotation.x = camData.pitch * Math.PI / 180;

  group.userData = { camIdx: camData.idx };
  markersGroup.add(group);
  camData.marker = group;
  camData.cone = cone;
  camData.wire = wire;
}

function updateCameraMarker(camData) {
  if (!camData.marker) return;
  camData.marker.position.set(camData.x, camData.height, camData.z);
  camData.marker.rotation.y = -camData.yaw * Math.PI / 180;
  camData.marker.rotation.x = camData.pitch * Math.PI / 180;

  // Update frustum cone
  const fovRad = camData.fov * Math.PI / 180;
  const coneLen = 2;
  const coneRad = Math.tan(fovRad / 2) * coneLen;
  camData.cone.geometry.dispose();
  camData.cone.geometry = new THREE.ConeGeometry(coneRad, coneLen, 4, 1, true);
  camData.cone.position.z = 0.25 + coneLen / 2;
}

// ═══════════════════════════════════════════
// Camera Management
// ═══════════════════════════════════════════
function calcFOV(focalLength, sensorHeight) {
  return 2 * Math.atan(sensorHeight / (2 * focalLength)) * 180 / Math.PI;
}

function addCamera(x, z) {
  const sensorW = parseFloat(document.getElementById('sensor-select').value.split(',')[0]);
  const sensorH = parseFloat(document.getElementById('sensor-select').value.split(',')[1]);
  const focal = parseFloat(document.getElementById('focal-range').value);
  const fov = calcFOV(focal, sensorH);
  const colorIdx = state.camCounter % COLORS.length;

  // Auto-aim toward scene center
  const dx = 0 - x, dz = -4 - z;
  const yaw = Math.atan2(-dx, -dz) * 180 / Math.PI;

  const cam = {
    idx: state.camCounter++,
    name: `CAM-${String(state.camCounter).padStart(2, '0')}`,
    x, z, height: 1.6,
    yaw: yaw,
    pitch: 0,
    focal, sensorW, sensorH,
    fstop: 2.8,
    fov,
    color: COLORS[colorIdx],
    marker: null, cone: null, wire: null,
  };
  state.cameras.push(cam);
  createCameraMarker(cam);
  selectCamera(state.cameras.length - 1);
  updateCamList();
  setMode('navigate');
}

function deleteCamera(idx) {
  const camIdx = state.cameras.findIndex(c => c.idx === idx);
  if (camIdx < 0) return;
  const cam = state.cameras[camIdx];
  if (cam.marker) {
    markersGroup.remove(cam.marker);
    cam.marker.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) child.material.dispose();
    });
  }
  state.cameras.splice(camIdx, 1);
  if (state.selectedIdx === idx) {
    state.selectedIdx = -1;
    if (state.viewfinder) toggleViewfinder();
    document.getElementById('params-section').style.display = 'none';
  }
  updateCamList();
}

function selectCamera(idx) {
  state.selectedIdx = idx;
  const cam = state.cameras.find(c => c.idx === idx);
  if (!cam) return;

  // Highlight marker
  state.cameras.forEach(c => {
    if (c.marker) {
      const isSelected = c.idx === idx;
      c.cone.material.opacity = isSelected ? 0.15 : 0.06;
      c.wire.material.opacity = isSelected ? 0.6 : 0.2;
    }
  });

  // Update params panel
  document.getElementById('params-section').style.display = 'block';
  document.getElementById('focal-range').value = cam.focal;
  document.getElementById('focal-val').textContent = cam.focal + 'mm';
  document.getElementById('fstop-range').value = cam.fstop;
  document.getElementById('fstop-val').textContent = 'f/' + cam.fstop;
  document.getElementById('height-range').value = cam.height;
  document.getElementById('height-val').textContent = cam.height + 'm';
  document.getElementById('yaw-range').value = cam.yaw;
  document.getElementById('yaw-val').textContent = Math.round(cam.yaw) + '°';
  document.getElementById('pitch-range').value = cam.pitch;
  document.getElementById('pitch-val').textContent = Math.round(cam.pitch) + '°';

  // Set sensor select
  const sel = document.getElementById('sensor-select');
  for (let i = 0; i < sel.options.length; i++) {
    const [sw, sh] = sel.options[i].value.split(',').map(Number);
    if (Math.abs(sw - cam.sensorW) < 0.1 && Math.abs(sh - cam.sensorH) < 0.1) {
      sel.selectedIndex = i; break;
    }
  }

  updateVFInfo();
  updateCamList();

  // If in viewfinder mode, update camera immediately
  if (state.viewfinder) updateVFCamera();
}

function getSelectedCam() {
  return state.cameras.find(c => c.idx === state.selectedIdx);
}

// ═══════════════════════════════════════════
// UI Updates
// ═══════════════════════════════════════════
function updateCamList() {
  const list = document.getElementById('cam-list');
  list.innerHTML = '';
  if (state.cameras.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text2);padding:8px;text-align:center">暂无机位，点击下方按钮添加</div>';
    return;
  }
  state.cameras.forEach(cam => {
    const item = document.createElement('div');
    item.className = 'cam-item' + (cam.idx === state.selectedIdx ? ' selected' : '');
    item.innerHTML = `
      <div class="cam-dot" style="background:#${cam.color.toString(16).padStart(6,'0')}"></div>
      <div class="cam-name">${cam.name}</div>
      <div class="cam-focal">${cam.focal}mm</div>
      <div class="cam-del" onclick="event.stopPropagation();deleteCamera(${cam.idx})">&times;</div>
    `;
    item.onclick = () => selectCamera(cam.idx);
    item.ondblclick = () => { selectCamera(cam.idx); if (!state.viewfinder) toggleViewfinder(); };
    list.appendChild(item);
  });
}

// ═══════════════════════════════════════════
// Mode & View
// ═══════════════════════════════════════════
function setMode(mode) {
  state.mode = mode;
  document.querySelectorAll('[data-mode]').forEach(el => {
    el.classList.toggle('active', el.dataset.mode === mode);
  });
  const hint = document.getElementById('hint-text');
  if (mode === 'add') {
    hint.textContent = '点击场景地面放置机位';
    hint.className = 'hint add-mode-hint';
    hint.style.display = 'block';
    controls.enabled = false;
    renderer.domElement.style.cursor = 'crosshair';
  } else {
    hint.style.display = 'none';
    controls.enabled = !state.viewfinder;
    renderer.domElement.style.cursor = 'default';
  }
}

function toggleViewfinder() {
  const cam = getSelectedCam();
  if (!cam && !state.viewfinder) {
    // No camera selected, show hint
    const hint = document.getElementById('hint-text');
    hint.textContent = '请先选择或添加一个机位';
    hint.className = 'hint';
    hint.style.display = 'block';
    setTimeout(() => hint.style.display = 'none', 2000);
    return;
  }

  state.viewfinder = !state.viewfinder;
  const overlay = document.getElementById('viewfinder-overlay');
  const tab = document.getElementById('vf-tab');

  if (state.viewfinder && cam) {
    overlay.style.display = 'block';
    tab.classList.add('active');
    controls.enabled = false;
    updateVFCamera();
    updateVFInfo();
    drawGridOverlay();
  } else {
    overlay.style.display = 'none';
    tab.classList.remove('active');
    state.viewfinder = false;
    controls.enabled = true;
  }
}

function updateVFCamera() {
  const cam = getSelectedCam();
  if (!cam) return;
  vfCamera.fov = cam.fov;
  vfCamera.aspect = cam.sensorW / cam.sensorH;
  vfCamera.updateProjectionMatrix();
  vfCamera.position.set(cam.x, cam.height, cam.z);

  // Calculate look-at point based on yaw and pitch
  const yawRad = cam.yaw * Math.PI / 180;
  const pitchRad = cam.pitch * Math.PI / 180;
  const dist = 10;
  const lookAt = new THREE.Vector3(
    cam.x + Math.sin(yawRad) * Math.cos(pitchRad) * dist,
    cam.height + Math.sin(pitchRad) * dist,
    cam.z + Math.cos(yawRad) * Math.cos(pitchRad) * dist
  );
  vfCamera.lookAt(lookAt);
}

function updateVFInfo() {
  const cam = getSelectedCam();
  if (!cam) return;
  document.getElementById('vf-cam-name').textContent = cam.name;
  document.getElementById('vf-focal').textContent = cam.focal;
  document.getElementById('vf-fstop').textContent = cam.fstop;
  document.getElementById('vf-fov').textContent = cam.fov.toFixed(1);
  document.getElementById('vf-sensor-info').textContent = cam.sensorW + 'x' + cam.sensorH + 'mm';
}

function drawGridOverlay() {
  const canvas = document.getElementById('grid-canvas');
  const rect = viewport.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!state.overlays.grid) return;

  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;

  // Rule of thirds
  const x1 = canvas.width / 3, x2 = canvas.width * 2 / 3;
  const y1 = canvas.height / 3, y2 = canvas.height * 2 / 3;

  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(x1, 0); ctx.lineTo(x1, canvas.height);
  ctx.moveTo(x2, 0); ctx.lineTo(x2, canvas.height);
  ctx.moveTo(0, y1); ctx.lineTo(canvas.width, y1);
  ctx.moveTo(0, y2); ctx.lineTo(canvas.width, y2);
  ctx.stroke();

  // Center crosshair
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.setLineDash([]);
  const cx = canvas.width / 2, cy = canvas.height / 2;
  ctx.beginPath();
  ctx.moveTo(cx - 15, cy); ctx.lineTo(cx + 15, cy);
  ctx.moveTo(cx, cy - 15); ctx.lineTo(cx, cy + 15);
  ctx.stroke();

  // Level indicator
  if (state.overlays.level) {
    const cam = getSelectedCam();
    if (cam) {
      ctx.save();
      ctx.translate(cx, canvas.height - 50);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2;
      // Horizon line
      const roll = 0; // no roll in current impl
      ctx.beginPath();
      ctx.moveTo(-60, 0);
      ctx.lineTo(60, 0);
      ctx.stroke();
      // Pitch indicator
      const pitchOffset = cam.pitch * 2;
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '10px monospace';
      ctx.fillText(cam.pitch + '°', 70, pitchOffset + 4);
      ctx.beginPath();
      ctx.moveTo(60, pitchOffset);
      ctx.lineTo(68, pitchOffset);
      ctx.stroke();
      ctx.restore();
    }
  }
}

// ═══════════════════════════════════════════
// Parameter Handlers
// ═══════════════════════════════════════════
function onSensorChange() {
  const cam = getSelectedCam();
  if (!cam) return;
  const [sw, sh] = document.getElementById('sensor-select').value.split(',').map(Number);
  cam.sensorW = sw; cam.sensorH = sh;
  cam.fov = calcFOV(cam.focal, sh);
  updateCameraMarker(cam);
  updateVFInfo();
  if (state.viewfinder) updateVFCamera();
}

function onFocalChange(val) {
  const cam = getSelectedCam();
  if (!cam) return;
  val = parseInt(val);
  cam.focal = val;
  cam.fov = calcFOV(val, cam.sensorH);
  document.getElementById('focal-val').textContent = val + 'mm';
  updateCameraMarker(cam);
  updateVFInfo();
  if (state.viewfinder) updateVFCamera();
}

function onFStopChange(val) {
  const cam = getSelectedCam();
  if (!cam) return;
  cam.fstop = parseFloat(val);
  document.getElementById('fstop-val').textContent = 'f/' + parseFloat(val).toFixed(1);
  updateVFInfo();
}

function onHeightChange(val) {
  const cam = getSelectedCam();
  if (!cam) return;
  cam.height = parseFloat(val);
  document.getElementById('height-val').textContent = parseFloat(val).toFixed(1) + 'm';
  updateCameraMarker(cam);
  if (state.viewfinder) updateVFCamera();
}

function onYawChange(val) {
  const cam = getSelectedCam();
  if (!cam) return;
  cam.yaw = parseFloat(val);
  document.getElementById('yaw-val').textContent = Math.round(val) + '°';
  updateCameraMarker(cam);
  if (state.viewfinder) updateVFCamera();
}

function onPitchChange(val) {
  const cam = getSelectedCam();
  if (!cam) return;
  cam.pitch = parseFloat(val);
  document.getElementById('pitch-val').textContent = Math.round(val) + '°';
  updateCameraMarker(cam);
  if (state.viewfinder) {
    updateVFCamera();
    drawGridOverlay();
  }
}

// ═══════════════════════════════════════════
// Toggle Overlays
// ═══════════════════════════════════════════
function toggleOverlay(key) {
  state.overlays[key] = !state.overlays[key];
  document.getElementById('tog-' + key).classList.toggle('on');
  if (key === 'grid' || key === 'level') drawGridOverlay();
  if (key === 'action') document.getElementById('action-safe').style.display = state.overlays.action ? 'block' : 'none';
  if (key === 'title') document.getElementById('title-safe').style.display = state.overlays.title ? 'block' : 'none';
}

function toggleScene(key) {
  state.sceneItems[key] = !state.sceneItems[key];
  document.getElementById('tog-' + key).classList.toggle('on');
  if (key === 'floor') { floor.visible = state.sceneItems.floor; gridHelper.visible = state.sceneItems.floor; }
  if (key === 'objects') objectsGroup.visible = state.sceneItems.objects;
  if (key === 'markers') markersGroup.visible = state.sceneItems.markers;
}

// ═══════════════════════════════════════════
// Click to Place Camera
// ═══════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e) => {
  if (state.mode !== 'add') return;
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, mainCamera);
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const point = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, point);

  if (point) {
    // Clamp to scene bounds
    point.x = Math.max(-18, Math.min(18, point.x));
    point.z = Math.max(-13, Math.min(13, point.z));
    addCamera(point.x, point.z);
  }
});

// ═══════════════════════════════════════════
// Keyboard Shortcuts
// ═══════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  if (e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key) - 1;
    if (idx < state.cameras.length) selectCamera(state.cameras[idx].idx);
  }
  if (e.key === 'v' || e.key === 'V') toggleViewfinder();
  if (e.key === 'a' || e.key === 'A') setMode('add');
  if (e.key === 'Escape') {
    if (state.mode === 'add') setMode('navigate');
    else if (state.viewfinder) toggleViewfinder();
  }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (state.selectedIdx >= 0 && !state.viewfinder) {
      deleteCamera(state.selectedIdx);
    }
  }
});

// ═══════════════════════════════════════════
// Resize
// ═══════════════════════════════════════════
function onResize() {
  const rect = viewport.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  renderer.setSize(w, h);
  mainCamera.aspect = w / h;
  mainCamera.updateProjectionMatrix();
  if (state.viewfinder) drawGridOverlay();
}
window.addEventListener('resize', onResize);
new ResizeObserver(onResize).observe(viewport);

// ═══════════════════════════════════════════
// Render Loop
// ═══════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  if (state.viewfinder && getSelectedCam()) {
    renderer.render(scene, vfCamera);
  } else {
    renderer.render(scene, mainCamera);
  }
}

// ═══════════════════════════════════════════
// Add Preset Cameras for Demo
// ═══════════════════════════════════════════
function addPresetCameras() {
  // Wide shot from back
  const c1 = { x: 0, z: 10, height: 2.0, yaw: 0, pitch: -5, focal: 24, name: 'Wide' };
  // Medium from side
  const c2 = { x: -8, z: 2, height: 1.6, yaw: 60, pitch: -2, focal: 50, name: 'Medium-L' };
  // Close-up from front
  const c3 = { x: 2, z: -1, height: 1.5, yaw: 160, pitch: 5, focal: 85, name: 'CU' };

  [c1, c2, c3].forEach(preset => {
    const sensorW = 36, sensorH = 24;
    const fov = calcFOV(preset.focal, sensorH);
    const colorIdx = state.camCounter % COLORS.length;
    const cam = {
      idx: state.camCounter++,
      name: `CAM-${String(state.camCounter).padStart(2, '0')} ${preset.name}`,
      x: preset.x, z: preset.z,
      height: preset.height,
      yaw: preset.yaw, pitch: preset.pitch,
      focal: preset.focal, sensorW, sensorH,
      fstop: 2.8, fov,
      color: COLORS[colorIdx],
      marker: null, cone: null, wire: null,
    };
    state.cameras.push(cam);
    createCameraMarker(cam);
  });

  selectCamera(state.cameras[0].idx);
  updateCamList();
}

// Init
addPresetCameras();
updateCamList();
onResize();
animate();
</script>
